<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RSI Trainer</title>
</head>
<body>
  <main>
    <h1>RSI Trainer</h1>
    <p>Ćwiczenie kolejności działań i dawek leków w RSI.</p>

    <section>
      <button id="nextCaseBtn" type="button">Następny przypadek</button>
      <button id="modeBtn" type="button">Tryb: nauka/egzamin</button>
      <button id="showAnswerBtn" type="button">Pokaż odpowiedź</button>
      <button id="resetBtn" type="button">Reset</button>
    </section>

    <section>
      <h2>Pacjent</h2>
      <div id="caseInfo"></div>
    </section>

    <section>
      <h2>Kolejność działań</h2>
      <p>Klikaj czynności z listy poniżej, żeby zbudować sekwencję.</p>
      <div id="stepList"></div>
      <button id="checkStepsBtn" type="button">Sprawdź kolejność</button>
      <div id="stepResult"></div>
    </section>

    <section>
      <h2>Dostępne leki</h2>
      <p>Wpisz dawkę dla każdego leku.</p>
      <form id="drugForm"></form>
      <button id="checkDrugsBtn" type="button">Sprawdź dawki</button>
      <div id="drugResult"></div>
    </section>

    <section>
      <h2>Odpowiedź</h2>
      <pre id="answerBox"></pre>
    </section>
  </main>

  <script src="cases.json"></script>
  <script src="app.js"></script>
</body>
</html>
