<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSI Trainer - Medycyna Ratunkowa</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        .setup-box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        .step-card { border: 2px solid #3498db; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; background: #3498db; color: white; font-weight: bold; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        .feedback { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; text-align: center; }
        .progress { font-size: 0.8rem; color: #7f8c8d; text-align: right; }
        .summary { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Trenażer Procedury RSI</h1>
    
    <div id="setup" class="setup-box">
        <label>Waga pacjenta (kg):</label>
        <input type="number" id="weight" value="80" min="1" max="150">
        <label>Typ pacjenta:</label>
        <select id="type">
            <option value="adult">Dorosły</option>
            <option value="pediatric">Dziecko</option>
        </select>
        <button onclick="startTraining()" style="width: 100%; background: var(--success);">Rozpocznij Procedurę</button>
    </div>

    <div id="game" style="display: none;">
        <div class="progress">Krok: <span id="step-num">1</span>/7</div>
        <div class="step-card">
            <h3 id="step-title">Przygotowanie</h3>
            <p id="step-desc">Wybierz odpowiednie działanie lub lek dla tego etapu:</p>
            
            <div id="action-options" class="options"></div>
            <div id="dose-options" class="options" style="display: none;"></div>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="summary" class="summary">
        <h2>Procedura Zakończona!</h2>
        <p>Gratulacje, pacjent został bezpiecznie zaintubowany.</p>
        <button onclick="location.reload()">Zacznij od nowa</button>
    </div>
</div>

<script>
    const steps = [
        { title: "1. Preparation (Przygotowanie)", correctAction: "Ssawka, Monitor, Dostęp IV", hasDose: false },
        { title: "2. Preoxygenation (Preoksygenacja)", correctAction: "Bierna tlenoterapia 100% przez 3-5 min", hasDose: false },
        { title: "3. Pretreatment (Przygotowanie wstępne)", correctAction: "Fentanyl", doseMg: 0.003, hasDose: true }, // 3 mcg/kg
        { title: "4. Paralysis with Induction", correctAction: "Etomidat", doseMg: 0.3, hasDose: true },
        { title: "5. Positioning (Pozycja)", correctAction: "Pozycja węszeniowa", hasDose: false },
        { title: "6. Placement with proof", correctAction: "Intubacja i Kapnografia", hasDose: false },
        { title: "7. Post-intubation management", correctAction: "Sedacja i wentylacja mechaniczna", hasDose: false }
    ];

    let currentStep = 0;
    let weight = 80;

    const actionsPool = [
        "Ssawka, Monitor, Dostęp IV", "Bierna tlenoterapia 100% przez 3-5 min", "Fentanyl", 
        "Etomidat", "Pozycja węszeniowa", "Intubacja i Kapnografia", "Sedacja i wentylacja mechaniczna",
        "Podanie Atropiny", "Uciskanie klatki piersiowej", "Głęboka sedacja propofolem"
    ];

    function startTraining() {
        weight = document.getElementById('weight').value;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        loadStep();
    }

    function loadStep() {
        const step = steps[currentStep];
        document.getElementById('step-num').innerText = currentStep + 1;
        document.getElementById('step-title').innerText = step.title;
        const actionDiv = document.getElementById('action-options');
        const doseDiv = document.getElementById('dose-options');
        const feedback = document.getElementById('feedback');
        
        feedback.style.display = 'none';
        doseDiv.style.display = 'none';
        actionDiv.innerHTML = '';
        
        // Tasowanie opcji działań (uproszczone)
        const shuffledActions = [...actionsPool].sort(() => 0.5 - Math.random());
        // Upewnij się, że poprawna odpowiedź jest w puli
        if(!shuffledActions.includes(step.correctAction)) shuffledActions[0] = step.correctAction;

        shuffledActions.slice(0, 4).forEach(action => {
            const btn = document.createElement('button');
            btn.innerText = action;
            btn.onclick = () => checkAction(action);
            actionDiv.appendChild(btn);
        });
    }

    function checkAction(selected) {
        const step = steps[currentStep];
        const feedback = document.getElementById('feedback');
        
        if (selected === step.correctAction) {
            if (step.hasDose) {
                showDoseOptions(step);
            } else {
                nextStep();
            }
        } else {
            showFeedback("Błędna kolejność! Spróbuj ponownie.", "var(--error)");
        }
    }

    function showDoseOptions(step) {
        const doseDiv = document.getElementById('dose-options');
        const actionDiv = document.getElementById('action-options');
        actionDiv.innerHTML = '<p><b>Dobra akcja! Teraz wybierz dawkę:</b></p>';
        doseDiv.innerHTML = '';
        doseDiv.style.display = 'grid';

        const correctDose = (step.doseMg * weight).toFixed(1);
        const doses = [
            correctDose,
            (correctDose * 0.5).toFixed(1),
            (correctDose * 2).toFixed(1),
            (Math.random() * 100).toFixed(1)
        ].sort(() => 0.5 - Math.random());

        doses.forEach(dose => {
            const btn = document.createElement('button');
            btn.innerText = dose + " mg";
            btn.onclick = () => {
                if (dose === correctDose) nextStep();
                else showFeedback("Zła dawka! Przelicz jeszcze raz.", "var(--error)");
            };
            doseDiv.appendChild(btn);
        });
    }

    function showFeedback(text, color) {
        const f = document.getElementById('feedback');
        f.innerText = text;
        f.style.background = color;
        f.style.color = "white";
        f.style.display = "block";
    }

    function nextStep() {
        currentStep++;
        if (currentStep < steps.length) {
            loadStep();
        } else {
            document.getElementById('game').style.display = 'none';
            document.getElementById('summary').style.display = 'block';
        }
    }
</script>

</body>
</html>
