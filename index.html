<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSI Trainer - Pamięć Mięśniowa</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        .setup-box, .step-card, .summary { display: none; }
        .active { display: block; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        /* Grid ułatwiający zapamiętywanie pozycji */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .options-grid button { margin: 0; height: 100%; min-height: 70px; background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .options-grid button:active { transform: scale(0.95); background: #2980b9; }
        
        .setup-box button, .summary button { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
        .label-step { color: #7f8c8d; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="setup-box active">
        <h2>Parametry Pacjenta</h2>
        <label>Waga (kg):</label>
        <input type="number" id="weight" value="80">
        <label>Typ pacjenta:</label>
        <select id="patient-type">
            <option value="adult">Dorosły</option>
            <option value="child">Dziecko</option>
        </select>
        <button onclick="startTraining()">ROZPOCZNIJ TRENING</button>
    </div>

    <div id="game" class="step-card">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <div class="label-step" id="step-label">Krok 1 z 7</div>
        <h3 id="step-title">Tytuł kroku</h3>
        <p id="step-instruction">Wybierz właściwe działanie:</p>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="summary" class="summary">
        <h2 style="color: var(--success)">✓ Procedura zakończona</h2>
        <p id="summary-stats"></p>
        <button onclick="location.reload()">POWTÓRZ TRENING</button>
    </div>
</div>

<script>
    let weight = 80;
    let currentStep = 0;
    let mistakes = 0;

    // Pełna kontrola nad interfejsem – brak funkcji losujących
    // Opcje zawsze pojawią się w kolejności: [Lewy Górny, Prawy Górny, Lewy Dolny, Prawy Dolny]
    const protocol = [
        { 
            title: "1. Preparation (Przygotowanie)", 
            action: "Ssawka, Monitor, Dostęp IV", 
            options: ["Masaż serca", "Ssawka, Monitor, Dostęp IV", "Lidokaina", "Tlen 100% (3-5 min)"], 
            needsDose: false 
        },
        { 
            title: "2. Preoxygenation (Preoksygenacja)", 
            action: "Tlen 100% (3-5 min)", 
            options: ["Tlen 100% (3-5 min)", "Fentanyl", "Intubacja", "Defibrylacja"], 
            needsDose: false 
        },
        { 
            title: "3. Pretreatment (Przygotowanie)", 
            action: "Fentanyl", 
            options: ["Etomidat", "Rokuronium", "Fentanyl", "Propofol"], 
            needsDose: true, 
            unit: "mg", 
            doseMultipliers: [0.001, 0.003, 0.01, 0.03], // Poprawna dawka to x0.003 (3 mcg/kg)
            correctMultiplier: 0.003 
        },
        { 
            title: "4. Paralysis with Induction", 
            action: "Etomidat", 
            options: ["Fentanyl", "Midazolam", "Rokuronium", "Etomidat"], 
            needsDose: true, 
            unit: "mg", 
            doseMultipliers: [0.1, 0.3, 0.6, 1.0], // Poprawna dawka to x0.3
            correctMultiplier: 0.3 
        },
        { 
            title: "5. Paralysis (Zwiotczenie)", 
            action: "Rokuronium", 
            options: ["Sukcynylocholina", "Rokuronium", "Wekuronium", "Etomidat"], 
            needsDose: true, 
            unit: "mg", 
            doseMultipliers: [0.6, 1.2, 2.0, 5.0], // Poprawna dawka to x1.2
            correctMultiplier: 1.2 
        },
        { 
            title: "6. Placement with proof", 
            action: "Intubacja i EtCO2", 
            options: ["Kontynuacja sedacji", "Intubacja i EtCO2", "Dostęp IV", "Podanie Atropiny"], 
            needsDose: false 
        },
        { 
            title: "7. Post-intubation care", 
            action: "Sedacja i wentylacja", 
            options: ["Tlen 100% (3-5 min)", "Rozkurcz oskrzeli", "Sedacja i wentylacja", "Ekstubacja"], 
            needsDose: false 
        }
    ];

    function startTraining() {
        weight = parseFloat(document.getElementById('weight').value);
        document.getElementById('setup').classList.remove('active');
        document.getElementById('game').classList.add('active');
        loadStep();
    }

    function loadStep() {
        const step = protocol[currentStep];
        document.getElementById('step-label').innerText = `Krok ${currentStep + 1} z ${protocol.length}`;
        document.getElementById('step-title').innerText = step.title;
        document.getElementById('step-instruction').innerText = "Wybierz właściwe działanie:";
        document.getElementById('progress').style.width = `${(currentStep / protocol.length) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Renderowanie stałej listy opcji z tablicy "options"
        step.options.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => checkAction(choice);
            container.appendChild(btn);
        });
    }

    function checkAction(selected) {
        const step = protocol[currentStep];
        if (selected === step.action) {
            if (step.needsDose) {
                loadDoseStage(step);
            } else {
                nextStep();
            }
        } else {
            mistakes++;
            alert("BŁĄD! Pamiętaj o właściwej kolejności protokołu 7P.");
        }
    }

    function loadDoseStage(step) {
        document.getElementById('step-instruction').innerText = `Wybierz prawidłową dawkę dla leku: ${step.action} (waga: ${weight} kg)`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Renderowanie stałej listy dawek z tablicy "doseMultipliers"
        step.doseMultipliers.forEach(mult => {
            // Obliczenia przeliczające mnożnik i wagę, parseFloat usuwa zbędne zera po przecinku
            const doseVal = parseFloat((mult * weight).toFixed(3));
            const correctVal = parseFloat((step.correctMultiplier * weight).toFixed(3));

            const btn = document.createElement('button');
            btn.innerText = `${doseVal} ${step.unit}`;
            btn.onclick = () => {
                if(doseVal === correctVal) {
                    nextStep();
                } else { 
                    mistakes++; 
                    alert(`Zła dawka! Prawidłowa dla pacjenta ${weight} kg to ${correctVal} ${step.unit}`); 
                }
            };
            container.appendChild(btn);
        });
    }

    function nextStep() {
        currentStep++;
        if (currentStep < protocol.length) {
            loadStep();
        } else {
            showSummary();
        }
    }

    function showSummary() {
        document.getElementById('progress').style.width = `100%`;
        document.getElementById('game').classList.remove('active');
        document.getElementById('summary').classList.add('active');
        document.getElementById('summary-stats').innerText = `Błędy popełnione podczas procedury: ${mistakes}`;
    }
</script>

</body>
</html>
